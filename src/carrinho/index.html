<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Carros Clássicos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>LocalMarket</h1>
            <div class="cart-icon" id="cart-icon-btn">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="products-grid">
        <div class="product-card">
            <img src="../imagens/chevette.jpg" alt="Chevette">
            <h3>Chevette</h3>
            <p class="price">R$ 1234,56</p>
            <button class="add-to-cart-btn" data-id="1" data-name="Chevette" data-price="1234.56">Adicionar ao carrinho</button>
        </div>

        <div class="product-card">
            <img src="../imagens/monza.jpg" alt="Monza">
            <h3>Monza</h3>
            <p class="price">R$ 2345,67</p>
            <button class="add-to-cart-btn" data-id="2" data-name="Monza" data-price="2345.67">Adicionar ao carrinho</button>
        </div>

        <div class="product-card">
            <img src="../imagens/omega.jpg" alt="Omega">
            <h3>Omega</h3>
            <p class="price">R$ 3456,78</p>
            <button class="add-to-cart-btn" data-id="3" data-name="Omega" data-price="3456.78">Adicionar ao carrinho</button>
        </div>

        <div class="product-card">
            <img src="../imagens/opala.jpg" alt="Opala">
            <h3>Opala</h3>
            <p class="price">R$ 4567,89</p>
            <button class="add-to-cart-btn" data-id="4" data-name="Opala" data-price="4567.89">Adicionar ao carrinho</button>
        </div>

        <div class="product-card">
            <img src="../imagens/fusca.jpg" alt="Fusca">
            <h3>Fusca</h3>
            <p class="price">R$ 5678,90</p>
            <button class="add-to-cart-btn" data-id="5" data-name="Fusca" data-price="5678.90">Adicionar ao carrinho</button>
        </div>

        <div class="product-card">
            <img src="../imagens/brasilia.jpg" alt="Brasília">
            <h3>Brasília</h3>
            <p class="price">R$ 6789,01</p>
            <button class="add-to-cart-btn" data-id="6" data-name="Brasília" data-price="6789.01">Adicionar ao carrinho</button>
        </div>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            
            <div id="step-cart">
                <h2>Seu Carrinho</h2>
                <div id="cart-items-list"></div>
                <div class="cart-total">
                    <strong>Total: <span id="cart-total-value">R$
